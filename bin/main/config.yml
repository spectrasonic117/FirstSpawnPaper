enabled: false
debug: false

chat-prefix: "<dark_gray><b>[<gradient:#2A7B9B:#57C785>FirstSpawn</gradient>]</b></dark_gray> <green>»</green> "

welcome-message:
    enabled: false
    prefix: "<gradient:blue:white>[TELCEL]"
    message: <green>Bienvenido

force_spawn: false

firstSpawn:
    world: world
    x: 0.0
    y: 64.0
    z: 0.0
    direction: "SOUTH"

messages:
    help:
        header: "<yellow>FirstSpawn Commands:</yellow>"
        set: "<gray>/firstspawn set</gray> - <white>Setear la ubicación de spawn</white>"
        status: "<gray>/firstspawn status</gray> - <white>Mostrar la configuración actual</white>"
        test: "<gray>/firstspawn test</gray> - <white>Teleportarse para prueba al spawn</white>"
        toggle: "<gray>/firstspawn toggle</gray> - <white>Habilitar/Deshabilitar el plugin</white>"
        forcespawn: "<gray>/firstspawn forcespawn <true|false></gray> - <white>Forzar spawn en cada entrada al servidor</white>"
        welcomemessage: "<gray>/firstspawn welcomemessage <true|false></gray> - <white>Activar/Desactivar el mensaje de bienvenida</white>"
        reload: "<gray>/firstspawn reload</gray> - <white>Recargar la configuración</white>"
        debug: "<gray>/firstspawn debug</gray> - <white>Alternar el modo debug</white>"

    spawn:
        set: "<green>La ubicación de primer spawn ha sido establecida a tu posición actual:</green> <yellow>{location}</yellow>"
        not_set: "<red>La ubicación de spawn no está establecida!</red>"
        teleported: "<green>Teletransportado a la ubicación de primer spawn!</green>"

    status:
        header: "<yellow>Estado de FirstSpawn:</yellow>"
        enabled: "<gray>Plugin habilitado:</gray> {status}"
        debug: "<gray>Modo debug:</gray> {status}"
        force_spawn: "<gray>Force spawn:</gray> {status}"
        location: "<gray>Ubicación actual del spawn:</gray> <yellow>{location}</yellow>"
        welcome: "<gray>Mensaje de bienvenida:</gray> {status}"
        welcome_message: "<gray>  Mensaje:</gray> {message}"

    toggle:
        success: "FirstSpawn ahora está {status}"
        debug: "Modo debug ahora está {status}"

    forcespawn:
        success: "<gray>Force spawn ahora está</gray> {status}"
        enabled: "<yellow>Los jugadores serán teletransportados al spawn cada vez que entren al servidor</yellow>"
        disabled: "<yellow>Solo los jugadores nuevos serán teletransportados al spawn</yellow>"

    welcomemessage:
        success: "<gray>Mensaje de bienvenida ahora está</gray> {status}"
        enabled: "<yellow>Los jugadores verán el mensaje de bienvenida al entrar al servidor</yellow>"
        disabled: "<yellow>Los jugadores no verán el mensaje de bienvenida</yellow>"

    reload:
        success: "<green>La configuración ha sido recargada!</green>"

    system:
        startup_line1: "<gray>----------------------------------------</gray>"
        startup_enabled: "<white>{plugin_name}</white> <green>Plugin Enabled!</green>"
        startup_version: "<light_purple>Version: </light_purple>{version}"
        startup_author: "<white>Developed by: </white><red>{author}</red>"
        startup_line2: "<gray>----------------------------------------</gray>"
        shutdown: "<red>{plugin_name} plugin Disabled!</red>"
        permission: "<red>You do not have permission to use this command!</red>"
